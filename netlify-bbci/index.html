<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planet Portfolio | Product Workflow</title>
    <meta
      name="description"
      content="Planet Portfolio is the workflow layer between Merge OS and a clean consumer-facing habitat contribution experience."
    />
    <meta name="theme-color" content="#10261d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Planet Portfolio" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/bbci-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="app-sidebar">
        <a class="brand-lockup" href="#" aria-label="Planet Portfolio">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <strong>Planet Portfolio</strong>
            <small>Workflow layer</small>
          </span>
        </a>

        <nav class="workflow-nav" aria-label="Workflow screens">
          <button class="workflow-link is-active" data-screen="consumer-project">
            <span>01</span>
            <div>
              <strong>Consumer Project</strong>
              <small>Why support this?</small>
            </div>
          </button>
          <button class="workflow-link" data-screen="listing-grid">
            <span>02</span>
            <div>
              <strong>Listing Grid</strong>
              <small>What should be browsed?</small>
            </div>
          </button>
          <button class="workflow-link" data-screen="source-connection">
            <span>03</span>
            <div>
              <strong>Source Connection</strong>
              <small>Is the data connected?</small>
            </div>
          </button>
          <button class="workflow-link" data-screen="project-builder">
            <span>04</span>
            <div>
              <strong>Project Builder</strong>
              <small>What is needed to publish?</small>
            </div>
          </button>
          <button class="workflow-link" data-screen="media-manager">
            <span>05</span>
            <div>
              <strong>Media Manager</strong>
              <small>Is the story visual enough?</small>
            </div>
          </button>
          <button class="workflow-link" data-screen="payment-setup">
            <span>06</span>
            <div>
              <strong>Payment Setup</strong>
              <small>Can support be routed cleanly?</small>
            </div>
          </button>
          <button class="workflow-link" data-screen="consumer-preview">
            <span>07</span>
            <div>
              <strong>Consumer Preview</strong>
              <small>What will the customer see?</small>
            </div>
          </button>
          <button class="workflow-link" data-screen="publish-controls">
            <span>08</span>
            <div>
              <strong>Publish Controls</strong>
              <small>What state is it in?</small>
            </div>
          </button>
        </nav>
      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div>
            <p class="eyebrow">Merge OS -> Planet Portfolio -> Consumer UI</p>
            <h1>Project workflow</h1>
          </div>
          <div class="header-actions">
            <button class="header-chip">Connected to mock Merge source</button>
            <button class="header-chip header-chip-strong">Selected project syncs every screen</button>
          </div>
        </header>

        <section class="context-bar">
          <div id="record-switcher" class="record-switcher" aria-label="Project selector"></div>
          <div id="record-summary" class="record-summary"></div>
        </section>

        <section class="screen-stack">
          <section id="screen-consumer-project" class="screen-panel is-active">
            <div id="consumer-project-screen"></div>
          </section>

          <section id="screen-listing-grid" class="screen-panel">
            <div id="listing-grid-screen"></div>
          </section>

          <section id="screen-source-connection" class="screen-panel">
            <div id="source-connection-screen"></div>
          </section>

          <section id="screen-project-builder" class="screen-panel">
            <div id="project-builder-screen"></div>
          </section>

          <section id="screen-media-manager" class="screen-panel">
            <div id="media-manager-screen"></div>
          </section>

          <section id="screen-payment-setup" class="screen-panel">
            <div id="payment-setup-screen"></div>
          </section>

          <section id="screen-consumer-preview" class="screen-panel">
            <div id="consumer-preview-screen"></div>
          </section>

          <section id="screen-publish-controls" class="screen-panel">
            <div id="publish-controls-screen"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="./main.js" type="module"></script>
  </body>
</html>
